<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="/layout/defaultLayout.html">

<div class="container-fluid px-4" layout:fragment="content">

    <h3 class="mt-4 mb-4">게시판 글보기</h3>

    <!-- 내용 시작 -->
    <div class="card mb-4">
        <div class="card-header">
            <i class="fas fa-table me-1"></i>
            OOO 글보기
        </div>
        <div class="card-body">

            <form name="formWrite" th:action="@{/article/write}" method="post">
                <input type="hidden" name="writer" th:value="${#authentication.principal.user.uid}">
                <input type="hidden" name="cate" th:value="${cate}">
                <div class="mb-3">
                    <label for="exampleFormControlInput1" class="form-label" name="title" th:value="${articleDTO.title}">[[${article.title}]]</label>
                    <input type="email" class="form-control" id="exampleFormControlInput1" name="title">
                </div>
                <ul class="list-group">
                    <li th:each="file:${articleDTO.fileList}" class="list-group">

                    </li>

                </ul>

                <div class="mb-3">
                    <label for="exampleFormControlTextarea1" class="form-label">[[${article.content}]]</label>
                    <textarea class="form-control" id="exampleFormControlTextarea1" rows="10" name="content" placeholder="글 내용 입력">
                        [[${articleDTO.content}]]
                    </textarea>
                </div>

            </form>

        </div>

    </div>

    <div class="text-end">
        <a th:href="@{/article/list}" class="btn btn-primary" id="btnSubmit">목록</a>
    </div>

    <!-- 댓글 목록 시작-->
    <div class="mb-3">
        <label for="exampleFormControlTextarea1" class="form-label">댓글</label>
        <textarea class="form-control" rows="3" readonly>댓글 내용1</textarea>
    </div>

    <div class="input-group">
        <span class="input-group-text">댓글 입력</span>
        <textarea class="form-control" aria-label="With textarea" rows="4"></textarea>
    </div>

    <div mt-3>
        <button type="button" class="btn btn-secondary" th:href="@{/article/list}">취소</button>
        <input type="submit" class="btn btn-primary" value="댓글 등록"/>
    </div>






    <!-- 내용 끝 -->
</div>
</html>
